##############################################################################
# UAV Drone Detection System — Docker Compose (Local Development)
# All services on shared bridge network: uav-network
# Secrets loaded from .env (never committed — use .env.example as template)
##############################################################################

networks:
  uav-network:
    driver: bridge

volumes:
  postgres-data:
  clickhouse-data:
  redis-data:
  rabbitmq-data:

services:

  # ==========================================================================
  # API GATEWAY — Kong (DB-less / Declarative Mode)
  # ==========================================================================
  kong:
    image: kong:3.9-alpine
    container_name: uav-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_ADMIN_GUI_LISTEN: "0.0.0.0:8002"
      KONG_LOG_LEVEL: info
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    volumes:
      - ./kong:/etc/kong:ro
    ports:
      - "80:8000"       # Public HTTP proxy ingress
      - "8090:8002"     # Kong Manager UI (dev only)
    networks:
      - uav-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      userservice:
        condition: service_started
      deviceservice:
        condition: service_started
      ingestionservice:
        condition: service_started
      logservice:
        condition: service_started
      alertservice:
        condition: service_started

  # ==========================================================================
  # DATA STORES
  # ==========================================================================

  # ---------- PostgreSQL — User & Device Registry ----------
  postgres:
    image: postgres:16-alpine
    container_name: uav-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - uav-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------- ClickHouse — Columnar Log Storage ----------
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: uav-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "8123:8123"     # HTTP interface
      - "9000:9000"     # Native TCP protocol
    networks:
      - uav-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------- Redis — Distributed Cache & Heartbeat ----------
  redis:
    image: redis:7-alpine
    container_name: uav-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --notify-keyspace-events Ex
      --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - uav-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------- RabbitMQ — Async Event Bus ----------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: uav-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"     # AMQP protocol
      - "15672:15672"   # Management UI
    networks:
      - uav-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # APPLICATION SERVICES (.NET 9)
  # ==========================================================================

  # ---------- UserService — Auth, JWT, User CRUD ----------
  userservice:
    build:
      context: .
      dockerfile: src/UserService/UavSystem.UserService.WebApi/Dockerfile
    container_name: uav-userservice
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      # PostgreSQL
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_EXPIRES_SECONDS: ${JWT_EXPIRES_SECONDS}
      # gRPC
      GRPC_PORT: 9080
    ports:
      - "8080:8080"     # HTTP REST
      - "9080:9080"     # gRPC (internal)
    networks:
      - uav-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------- DeviceService — Device CRUD, Redis Sync, Heartbeat ----------
  deviceservice:
    build:
      context: .
      dockerfile: src/DeviceService/UavSystem.DeviceService.WebApi/Dockerfile
    container_name: uav-deviceservice
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8081"
      # PostgreSQL
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_VHOST: /
      # gRPC
      GRPC_PORT: 9081
      USERSERVICE_GRPC_URL: http://userservice:9080
    ports:
      - "8081:8081"     # HTTP REST
      - "9081:9081"     # gRPC (internal)
    networks:
      - uav-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ---------- IngestionService — High-Throughput Telemetry Pipeline ----------
  ingestionservice:
    build:
      context: .
      dockerfile: src/IngestionService/UavSystem.IngestionService.WebApi/Dockerfile
    container_name: uav-ingestionservice
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8082"
      # Redis (device validation — NEVER PostgreSQL)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # ClickHouse (log writes)
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      # RabbitMQ (alert publishing)
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_VHOST: /
      # gRPC (DeviceService state updates)
      DEVICE_SERVICE_GRPC_URL: http://deviceservice:9081
    ports:
      - "8082:8082"     # HTTP REST
    networks:
      - uav-network
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ---------- LogService — Paginated Historical Query API ----------
  logservice:
    build:
      context: .
      dockerfile: src/LogService/UavSystem.LogService.WebApi/Dockerfile
    container_name: uav-logservice
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8083"
      # ClickHouse (log reads — NEVER PostgreSQL)
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      # gRPC (UserService for monitor device scoping)
      USER_SERVICE_GRPC_URL: http://userservice:9080
    ports:
      - "8083:8083"     # HTTP REST
    networks:
      - uav-network
    depends_on:
      clickhouse:
        condition: service_healthy

  # ---------- AlertService — Real-Time WebSocket Alerts ----------
  alertservice:
    build:
      context: .
      dockerfile: src/AlertService/UavSystem.AlertService.WebApi/Dockerfile
    container_name: uav-alertservice
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8084"
      # Redis (monitor→device reverse lookup)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # RabbitMQ (consuming drone detection events)
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_VHOST: /
    ports:
      - "8084:8084"     # HTTP + WebSocket (SignalR)
    networks:
      - uav-network
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
