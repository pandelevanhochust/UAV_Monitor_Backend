---
# Namespace for the entire UAV system
apiVersion: v1
kind: Namespace
metadata:
  name: uav-system
  labels:
    name: uav-system

---
# ServiceAccount for applications
apiVersion: v1
kind: ServiceAccount
metadata:
  name: uav-app
  namespace: uav-system

---
# ClusterRole for pod monitoring and service discovery
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: uav-app-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: uav-app-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: uav-app-role
subjects:
  - kind: ServiceAccount
    name: uav-app
    namespace: uav-system
