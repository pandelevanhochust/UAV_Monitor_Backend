##############################################################################
# ha/poddisruptionbudgets.yaml — Guarantees minimum availability during
# voluntary disruptions (e.g., node drains, scaling).
##############################################################################
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ingestionservice-pdb
  namespace: uav-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ingestionservice
---
