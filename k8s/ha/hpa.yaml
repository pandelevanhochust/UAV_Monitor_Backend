##############################################################################
# ha/hpa.yaml — HorizontalPodAutoscaler
# Automatically scales IngestionService based on CPU utilization.
##############################################################################
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ingestionservice-hpa
  namespace: uav-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ingestionservice
  minReplicas: 3
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

