apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uav-ingress
  namespace: uav-system
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # Allow websockets
    nginx.org/websocket-services: "alertservice"
spec:
  rules:
    - host: uav.example.com # replace with your host
      http:
        paths:
          - path: /api/v1/
            pathType: Prefix
            backend:
              service:
                name: userservice
                port:
                  number: 8080
          - path: /api/v1/devices
            pathType: Prefix
            backend:
              service:
                name: deviceservice
                port:
                  number: 8081
          - path: /api/v1/telemetry
            pathType: Prefix
            backend:
              service:
                name: ingestionservice
                port:
                  number: 8082
          - path: /api/v1/logs
            pathType: Prefix
            backend:
              service:
                name: logservice
                port:
                  number: 8083
          - path: /ws/alerts
            pathType: Prefix
            backend:
              service:
                name: alertservice
                port:
                  number: 8084
