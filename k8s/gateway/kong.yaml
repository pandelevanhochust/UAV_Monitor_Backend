##############################################################################
# gateway/kong.yaml
# Kong in DB-less declarative mode, mounted from ConfigMap.
##############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: uav-system
  labels:
    app: kong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      containers:
        - name: kong
          image: kong:3.9
          ports:
            - containerPort: 8000   # Proxy HTTP
            - containerPort: 8001   # Admin API
            - containerPort: 8002   # Admin UI
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /etc/kong/kong.yml
            - name: KONG_PROXY_LISTEN
              value: "0.0.0.0:8000"
            - name: KONG_ADMIN_LISTEN
              value: "0.0.0.0:8001"
            - name: KONG_ADMIN_GUI_LISTEN
              value: "0.0.0.0:8002"
            - name: KONG_LOG_LEVEL
              value: info
          volumeMounts:
            - name: kong-config
              mountPath: /etc/kong
          livenessProbe:
            exec:
              command: ["kong", "health"]
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
      volumes:
        - name: kong-config
          configMap:
            name: kong-config
---
# LoadBalancer service — exposed locally via `minikube tunnel`
apiVersion: v1
kind: Service
metadata:
  name: kong
  namespace: uav-system
  labels:
    app: kong
spec:
  type: LoadBalancer
  selector:
    app: kong
  ports:
    - name: proxy
      port: 80
      targetPort: 8000
    - name: admin-ui
      port: 8090
      targetPort: 8002
