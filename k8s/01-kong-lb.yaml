---
# Kong ConfigMap (declarative configuration)
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: uav-system
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    services:
      # USER SERVICE — REST auth + gRPC validation endpoint
      - name: user-service
        url: http://userservice:8080
        routes:
          - name: public-auth-login
            paths:
              - /api/v1/auth/login
            strip_path: false
            methods:
              - POST
          - name: protected-admin-users
            paths:
              - /api/v1/admin/users
            strip_path: false

      # DEVICE SERVICE — CRUD + device management
      - name: device-service
        url: http://deviceservice:8081
        routes:
          - name: device-management-routes
            paths:
              - /api/v1/devices
              - /api/v1/admin/devices
            strip_path: false

      # LOG SERVICE — Paginated log reads
      - name: log-service
        url: http://logservice:8083
        routes:
          - name: analytical-log-routes
            paths:
              - /api/v1/logs
            strip_path: false

      # INGESTION SERVICE — Edge telemetry ingestion (NO JWT)
      - name: ingestion-service
        url: http://ingestionservice:8082
        routes:
          - name: public-edge-telemetry
            paths:
              - /api/v1/telemetry/log
            strip_path: false
            methods:
              - POST

      # ALERT SERVICE — WebSocket/SignalR for real-time alerts
      - name: alert-service
        url: http://alertservice:8084
        routes:
          - name: alert-websocket-hub
            paths:
              - /ws/alerts
            strip_path: false
            plugins:
              - name: cors
                config:
                  origins:
                    - http://localhost:3000
                    - http://localhost
                  methods:
                    - GET
                    - POST
                    - OPTIONS
                  headers:
                    - Accept
                    - Authorization
                    - Content-Type
                    - Keep-Alive
                    - User-Agent
                    - X-Requested-With
                    - X-SignalR-User-Agent
                  exposed_headers:
                    - X-SignalR-User-Agent
                  credentials: true
                  preflight_continue: false

---
# Kong Deployment (HA setup with 3 replicas)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: uav-system
  labels:
    app: kong
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - kong
                topologyKey: kubernetes.io/hostname
      containers:
        - name: kong
          image: kong:3.9-alpine
          ports:
            - containerPort: 8000
              name: proxy
            - containerPort: 8001
              name: admin
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /etc/kong/kong.yml
            - name: KONG_PROXY_LISTEN
              value: "0.0.0.0:8000"
            - name: KONG_ADMIN_LISTEN
              value: "0.0.0.0:8001"
            - name: KONG_LOG_LEVEL
              value: info
            - name: KONG_PROXY_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_PROXY_ERROR_LOG
              value: /dev/stderr
          volumeMounts:
            - name: kong-config
              mountPath: /etc/kong
              readOnly: true
          livenessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: kong-config
          configMap:
            name: kong-config
      serviceAccountName: uav-app

---
# Kong Service (LoadBalancer — exposed to external traffic)
apiVersion: v1
kind: Service
metadata:
  name: kong
  namespace: uav-system
  labels:
    app: kong
spec:
  type: LoadBalancer
  selector:
    app: kong
  ports:
    - name: proxy
      port: 80
      targetPort: 8000
      protocol: TCP
    - name: admin
      port: 8001
      targetPort: 8001
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
# Pod Disruption Budget for Kong (ensure at least 2 available during rolling updates/node drains)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kong-pdb
  namespace: uav-system
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: kong
