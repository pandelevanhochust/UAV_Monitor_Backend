---
# Secrets (replace placeholders with actual values)
apiVersion: v1
kind: Secret
metadata:
  name: uav-secrets
  namespace: uav-system
type: Opaque
stringData:
  POSTGRES_HOST: "postgresql.default.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB_USER: "uav_user_db"
  POSTGRES_DB_DEVICE: "uav_device_db"
  POSTGRES_USER: "uav_admin"
  POSTGRES_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"

  REDIS_HOST: "redis-master.default.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"

  RABBITMQ_HOST: "rabbitmq.uav-system.svc.cluster.local"
  RABBITMQ_PORT: "5672"
  RABBITMQ_DEFAULT_USER: "guest"
  RABBITMQ_DEFAULT_PASS: "REPLACE_WITH_SECURE_PASSWORD"
  RABBITMQ_VHOST: "/"

  CLICKHOUSE_HOST: "clickhouse.uav-system.svc.cluster.local"
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_DB: "uav_logs"
  CLICKHOUSE_USER: "default"
  CLICKHOUSE_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"

  JWT_SECRET: "REPLACE_WITH_32CHAR_SECRET"
  JWT_ISSUER: "uav-detection-system"
  JWT_AUDIENCE: "uav-supervisors"
  JWT_EXPIRES_SECONDS: "86400"

---
# ConfigMap for shared logging configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: uav-logging-config
  namespace: uav-system
data:
  serilog-appsettings.json: |
    {
      "Serilog": {
        "MinimumLevel": "Information",
        "WriteTo": [
          {
            "Name": "Console",
            "Args": {
              "outputTemplate": "[{Timestamp:yyyy-MM-dd HH:mm:ss.fff}] [{Level:u3}] [{SourceContext}] {Message:lj}{NewLine}{Exception}"
            }
          }
        ],
        "Enrich": ["FromLogContext", "WithMachineName", "WithEnvironmentUserName"]
      }
    }
