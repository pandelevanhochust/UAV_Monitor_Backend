---
# ============================================================================
# USERSERVICE — Auth & JWT validation (2+ replicas, horizontal auto-scaling)
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: userservice
  namespace: uav-system
  labels:
    app: userservice
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: userservice
  template:
    metadata:
      labels:
        app: userservice
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - userservice
                topologyKey: kubernetes.io/hostname
      serviceAccountName: uav-app
      containers:
        - name: userservice
          image: registry.digitalocean.com/REPLACE_REGISTRY/userservice:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9080
              name: grpc
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
          envFrom:
            - secretRef:
                name: uav-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: userservice
  namespace: uav-system
  labels:
    app: userservice
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for DNS-based service discovery
  selector:
    app: userservice
  ports:
    - port: 8080
      targetPort: 8080
      name: http
    - port: 9080
      targetPort: 9080
      name: grpc

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: userservice-pdb
  namespace: uav-system
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: userservice

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: userservice-hpa
  namespace: uav-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: userservice
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

