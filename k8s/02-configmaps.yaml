##############################################################################
# 02-configmaps.yaml
# Non-sensitive configuration mounted as files into containers:
#   - Postgres init SQL (schema + seed data)
#   - ClickHouse init SQL (radar_logs table)
#   - Kong declarative config (kong.yml)
##############################################################################

---
# ── Postgres init script — mounted at /docker-entrypoint-initdb.d/ ──────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: uav-system
data:
  01-init-databases.sql: |
    SELECT 'CREATE DATABASE uav_user_db' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'uav_user_db')\gexec
    SELECT 'CREATE DATABASE uav_device_db' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'uav_device_db')\gexec

    \c uav_user_db

    CREATE TABLE IF NOT EXISTS users (
        id UUID PRIMARY KEY,
        username VARCHAR(50) NOT NULL,
        email VARCHAR(150) NOT NULL UNIQUE,
        password_hash VARCHAR(255) NOT NULL,
        role VARCHAR(50) NOT NULL,
        updated_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP
    );

    INSERT INTO users (id, username, email, password_hash, role, updated_at) VALUES
        ('00000000-0000-0000-0000-000000000001', 'admin', 'toanlv@gmail.com', '$2a$11$kr2nwn5997f5u8JxORm.QePqd91TxqzaVDBWPMU9zMV59xwhng0iq', 'Admin', NOW()),
        ('00000000-0000-0000-0000-000000000002', 'monitor_toan', 'toan.monitor@uav-system.local', '$2a$11$97d9Vcgd7jd8RBJ52l8Al.YkRiHzxmDvR05.TkF9DaTz16pU3uS0i', 'Monitor', NOW()),
        ('00000000-0000-0000-0000-000000000003', 'monitor_hung', 'hung.monitor@uav-system.local', '$2a$11$1ShpIx7rv/I9IGDP8mxE/eCNRsanYsnMzXv/xyT8JZ2a0fGM86WhO', 'Monitor', NOW())
    ON CONFLICT (id) DO NOTHING;

    CREATE TABLE IF NOT EXISTS "__EFMigrationsHistory" (
        "MigrationId" varchar(150) NOT NULL PRIMARY KEY,
        "ProductVersion" varchar(32) NOT NULL
    );

    \c uav_device_db

    CREATE TABLE IF NOT EXISTS devices (
        device_id BIGINT PRIMARY KEY,
        location_name VARCHAR(255) NOT NULL,
        status VARCHAR(50) NOT NULL,
        assigned_monitor_id UUID NULL,
        api_key_hash VARCHAR(255) NOT NULL,
        updated_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP
    );

    INSERT INTO devices (device_id, location_name, status, assigned_monitor_id, api_key_hash, updated_at) VALUES
        (1001, 'Hanoi - North Gate Radar Station', 'Offline', '00000000-0000-0000-0000-000000000002', '$2a$11$fDX.YSw.UtCLsF.6cwD/MO2Pg4JiiWsCBIhay28ToisFyJkVrPoW6', NOW()),
        (1002, 'Hanoi - East Perimeter Radar Station', 'Offline', '00000000-0000-0000-0000-000000000003', '$2a$11$QYD3/P1xDKONuNMft9mfvu0EaPGIVOqTf8pL3lWU.sBArvKTE9Nu6', NOW()),
        (1003, 'Hanoi - South Airbase Radar Station', 'Offline', NULL, '$2a$11$5Lw27ACIxHAal2mtESZEl.DUnDy.IqT6QjcwEGuIL9XWgJNxWo7.K', NOW())
    ON CONFLICT (device_id) DO NOTHING;

    CREATE TABLE IF NOT EXISTS "__EFMigrationsHistory" (
        "MigrationId" varchar(150) NOT NULL PRIMARY KEY,
        "ProductVersion" varchar(32) NOT NULL
    );

---
# ── ClickHouse init script ───────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-init
  namespace: uav-system
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS uav_logs;

    CREATE TABLE IF NOT EXISTS uav_logs.radar_logs
    (
        device_id      UInt16,
        timestamp      DateTime64(3, 'UTC'),
        status         LowCardinality(String),
        detected       Bool,
        drone_type     LowCardinality(String),
        accuracy       Float32,
        control_state  LowCardinality(Nullable(String)),
        latency        Float32,
        frequency      Float32
    )
    ENGINE = MergeTree()
    PARTITION BY toYYYYMM(timestamp)
    ORDER BY (device_id, timestamp)
    TTL toDateTime(timestamp) + INTERVAL 3 MONTH;

---
# ── Kong declarative config ──────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: uav-system
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    services:
      - name: user-service
        url: http://userservice:8080
        routes:
          - name: public-auth-login
            paths:
              - /api/v1/auth/login
            strip_path: false
            methods:
              - POST
          - name: protected-admin-users
            paths:
              - /api/v1/admin/users
            strip_path: false

      - name: device-service
        url: http://deviceservice:8081
        routes:
          - name: device-management-routes
            paths:
              - /api/v1/devices
              - /api/v1/admin/devices
            strip_path: false

      - name: log-service
        url: http://logservice:8083
        routes:
          - name: analytical-log-routes
            paths:
              - /api/v1/logs
            strip_path: false

      - name: ingestion-service
        url: http://ingestionservice:8082
        routes:
          - name: public-edge-telemetry
            paths:
              - /api/v1/telemetry/log
            strip_path: false
            methods:
              - POST

      - name: alert-service
        url: http://alertservice:8084
        routes:
          - name: alert-websocket-hub
            paths:
              - /ws/alerts
            strip_path: false

