apiVersion: v1
kind: Secret
metadata:
  name: uav-secrets
  namespace: uav-system
type: Opaque
stringData:
  # Postgres
  POSTGRES_HOST: "postgres.internal"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "uav_system"
  POSTGRES_USER: "uav_admin"
  POSTGRES_PASSWORD: "REPLACE_ME"

  # Redis
  REDIS_HOST: "redis.internal"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "REPLACE_ME"

  # RabbitMQ
  RABBITMQ_HOST: "rabbitmq.internal"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "guest"
  RABBITMQ_PASSWORD: "REPLACE_ME"

  # ClickHouse
  CLICKHOUSE_HOST: "clickhouse.internal"
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_USER: "default"
  CLICKHOUSE_PASSWORD: "REPLACE_ME"
