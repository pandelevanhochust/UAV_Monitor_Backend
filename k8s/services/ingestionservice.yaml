##############################################################################
# services/ingestionservice.yaml — 3 replicas (primary LB demo target)
# This is the hot path: every telemetry POST goes through this service.
# HPA will scale it 2→6 based on CPU.
##############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestionservice
  namespace: uav-system
  labels:
    app: ingestionservice
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ingestionservice
  template:
    metadata:
      labels:
        app: ingestionservice
    spec:
      nodeSelector:
        tier: app
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: ingestionservice
      containers:
        - name: ingestionservice
          image: uav_monitor_backend-ingestionservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ASPNETCORE_URLS
              value: "http://+:8082"
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: CLICKHOUSE_HOST
              value: clickhouse
            - name: CLICKHOUSE_PORT
              value: "8123"
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_VHOST
              value: "/"
            - name: DEVICE_SERVICE_GRPC_URL
              value: "http://deviceservice:9081"
          envFrom:
            - secretRef:
                name: uav-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "384Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ingestionservice
  namespace: uav-system
  labels:
    app: ingestionservice
spec:
  selector:
    app: ingestionservice
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP



