##############################################################################
# services/logservice.yaml — 2 replicas
##############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logservice
  namespace: uav-system
  labels:
    app: logservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: logservice
  template:
    metadata:
      labels:
        app: logservice
    spec:
      nodeSelector:
        tier: app
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: logservice
      containers:
        - name: logservice
          image: uav_monitor_backend-logservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ASPNETCORE_URLS
              value: "http://+:8083"
            - name: CLICKHOUSE_HOST
              value: clickhouse
            - name: CLICKHOUSE_PORT
              value: "8123"
            - name: USER_SERVICE_GRPC_URL
              value: "http://userservice:9080"
          envFrom:
            - secretRef:
                name: uav-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: logservice
  namespace: uav-system
  labels:
    app: logservice
spec:
  selector:
    app: logservice
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP

---
##############################################################################
# services/alertservice.yaml — 2 replicas (SignalR WebSocket)
##############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertservice
  namespace: uav-system
  labels:
    app: alertservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alertservice
  template:
    metadata:
      labels:
        app: alertservice
    spec:
      nodeSelector:
        tier: app
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: alertservice
      containers:
        - name: alertservice
          image: uav_monitor_backend-alertservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ASPNETCORE_URLS
              value: "http://+:8084"
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_VHOST
              value: "/"
            - name: CORS_ORIGINS
              value: "http://localhost:3001,http://localhost:8880,http://localhost"
          envFrom:
            - secretRef:
                name: uav-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: alertservice
  namespace: uav-system
  labels:
    app: alertservice
spec:
  selector:
    app: alertservice
  ports:
    - port: 8084
      targetPort: 8084
  type: ClusterIP



