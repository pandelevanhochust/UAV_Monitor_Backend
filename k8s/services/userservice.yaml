##############################################################################
# services/userservice.yaml — 2 replicas, spread across app nodes
##############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: userservice
  namespace: uav-system
  labels:
    app: userservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: userservice
  template:
    metadata:
      labels:
        app: userservice
    spec:
      nodeSelector:
        tier: app
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: userservice
      containers:
        - name: userservice
          image: uav_monitor_backend-userservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
            - containerPort: 9080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: GRPC_PORT
              value: "9080"
          envFrom:
            - secretRef:
                name: uav-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: userservice
  namespace: uav-system
  labels:
    app: userservice
spec:
  selector:
    app: userservice
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 9080
      targetPort: 9080
  type: ClusterIP



