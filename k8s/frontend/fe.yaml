##############################################################################
# frontend/fe.yaml — Next.js dashboard, 2 replicas
# NodePort 30300 → host port 3001 (via kind extraPortMappings not set,
# but you can access via: kubectl port-forward svc/fe 3001:3000 -n uav-system)
##############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe
  namespace: uav-system
  labels:
    app: fe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fe
  template:
    metadata:
      labels:
        app: fe
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: fe
      containers:
        - name: fe
          image: uav_monitor_backend-fe:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: BACKEND_URL
              value: "http://kong:8000"
            - name: NEXT_PUBLIC_WS_URL
              value: "http://localhost:8880"   # kind host port for Kong proxy
            - name: JWT_ISSUER
              value: "uav-detection-system"
            - name: JWT_AUDIENCE
              value: "uav-supervisors"
          envFrom:
            - secretRef:
                name: uav-secrets
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "384Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: fe
  namespace: uav-system
  labels:
    app: fe
spec:
  selector:
    app: fe
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP


