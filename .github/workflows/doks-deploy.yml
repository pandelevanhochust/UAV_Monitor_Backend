name: Build and Deploy to DigitalOcean Kubernetes (DOKS)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      REGISTRY: registry.digitalocean.com/${{ secrets.DOCR_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v2
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DO_USERNAME }}
          password: ${{ secrets.DO_TOKEN }}

      - name: Build and push images
        run: |
          SERVICES=(userservice deviceservice ingestionservice logservice alertservice)
          for svc in "${SERVICES[@]}"; do
            IMAGE="$REGISTRY/$svc:${{ github.sha }}"
            docker build -t "$IMAGE" "./src/${svc^}" || docker build -t "$IMAGE" "./src/$svc"
            docker push "$IMAGE"
          done

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Configure kubectl
        run: |
          doctl kubernetes cluster kubeconfig save ${{ secrets.DOKS_CLUSTER_NAME }}

      - name: Deploy manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/secret-example.yaml
          kubectl apply -f k8s/
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
